name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # Only log in if it's a push to main, to prevent failures on PRs from forks without secrets
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }} # Push on main, build-only on PRs
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Self-Hosted Runner
    needs: build-and-push
    if: github.event_name != 'pull_request'
    # Use the self-hosted label
    runs-on: self-hosted

    steps:
      - name: Log in to Docker Hub
        # Logging in on the self-hosted runner might be necessary if your Hub repo is private
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull the latest image
        # Using :latest since we tagged the previous step with :latest
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:latest

      - name: Stop and remove existing container
        # Run '|| true' silently ignores if container is not running or doesn't exist
        run: |
          docker stop age-prediction-api || true
          docker rm age-prediction-api || true

      - name: Run new container
        run: |
          docker run -d \
            --name age-prediction-api \
            -p 8000:8000 \
            --restart unless-stopped \
            ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:latest

  deploy-local:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Deploy to Local Mac Server
        run: |
          # 1. Chỉ định đường dẫn Docker phổ biến trên Mac
          DOCKER_PATH="/usr/local/bin/docker"
          
          # 2. Đăng nhập Docker Hub
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | $DOCKER_PATH login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          
          # 3. Kéo Image mới
          $DOCKER_PATH pull ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:latest
          
          # 4. Dừng và xóa Container cũ (nếu có)
          $DOCKER_PATH stop age-api || true
          $DOCKER_PATH rm age-api || true
          
          # 5. Chạy Container mới
          $DOCKER_PATH run -d --name age-api -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:latest