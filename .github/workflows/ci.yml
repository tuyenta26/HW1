name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # Only log in if it's a push to main, to prevent failures on PRs from forks without secrets
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }} # Push on main, build-only on PRs
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Local Machine
    needs: build-and-push
    # Only deploy if it was a push to main branch
    if: github.event_name != 'pull_request'
    # Use the local machine registered as self-hosted
    runs-on: self-hosted
    
    steps:
      - name: Pull the latest Docker Image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:latest
        
      - name: Stop and Remove Existing Container
        run: |
          docker stop age-prediction-api || true
          docker rm age-prediction-api || true
          
      - name: Start the New Container
        run: |
          docker run -d \
            --name age-prediction-api \
            -p 8000:8000 \
            --restart unless-stopped \
            ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:latest
